name: email-triage-env
version: "1.0.0"
description: >
  A production-ready OpenEnv environment for training and evaluating AI agents
  on real-world email triage tasks. Agents classify, route, and prioritize
  synthetic emails across three difficulty tiers with full trajectory-level scoring.
author: "EmailTriageEnv Contributors"
license: MIT
python_requires: ">=3.10"
tags:
  - openenv
  - email-triage
  - nlp
  - real-world

http_endpoints:
  base_url: "http://localhost:7860"
  reset:
    method: POST
    path: /reset
    body: {task_id: "triage_easy", seed: 42, session_id: "default"}
    returns: Observation
  step:
    method: POST
    path: /step
    body: {email_id: str, label: str, queue: str, priority: int, session_id: "default"}
    returns: StepResult
  state:
    method: GET
    path: /state
    returns: dict
  health:
    method: GET
    path: /health
    returns: {status: "ok"}

tasks:
  - id: triage_easy
    difficulty: easy
    description: "Binary urgent/not_urgent classification of 20 synthetic emails."
    max_steps: 20
    reward_range: [0.0, 1.0]
    deterministic: true
    default_seed: 42

  - id: triage_medium
    difficulty: medium
    description: "Queue routing (5 departments) + priority (1-3) for 30 emails."
    max_steps: 30
    reward_range: [0.0, 1.0]
    deterministic: true
    default_seed: 42

  - id: triage_hard
    difficulty: hard
    description: >
      Full triage: queue routing, SLA estimation, duplicate detection,
      and escalation flagging for 40 emails. Weighted rubric grader.
    max_steps: 40
    reward_range: [0.0, 1.0]
    deterministic: true
    default_seed: 42

observation_space:
  type: structured
  schema: Observation
  pydantic_model: env.models.Observation

action_space:
  type: structured
  schema: Action
  pydantic_model: env.models.Action

reward:
  type: trajectory
  range: [0.0, 1.0]
  partial_credit: true
  shaped: true
  penalties:
    - name: lazy_routing
      trigger: ">70% of emails routed to general queue"
      value: -0.05
    - name: false_escalation
      trigger: "escalate=True when ground truth is False"
      value: -0.10
    - name: missed_duplicate
      trigger: "duplicate_of=None when a duplicate exists"
      value: -0.15

interface:
  python_class: env.environment.EmailTriageEnv
  methods:
    reset: "reset() -> Observation"
    step:  "step(action: Action) -> StepResult(observation, reward, done, info)"
    state: "state() -> dict"
